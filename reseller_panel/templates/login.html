{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="absolute inset-0 pointer-events-none" style="background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(249,115,22,0.07) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(234,88,12,0.05) 0%,transparent 60%)"></div>
    <div class="w-full max-w-md relative">
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto rounded-2xl brand-mark flex items-center justify-center mb-5 shadow-2xl" style="box-shadow:0 8px 32px rgba(249,115,22,0.35)">
                <svg width="38" height="38" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C12 2 7 8 7 13C7 15.76 9.24 18 12 18C14.76 18 17 15.76 17 13C17 8 12 2 12 2Z" fill="white" opacity="0.95"/>
                    <path d="M12 10C12 10 9.5 13 9.5 15C9.5 16.38 10.62 17.5 12 17.5C13.38 17.5 14.5 16.38 14.5 15C14.5 13 12 10 12 10Z" fill="white" opacity="0.5"/>
                    <path d="M8 18C6.5 19 6 20.5 6 22H18C18 20.5 17.5 19 16 18" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white">{{ settings_get('site_name', 'LavaDev') }}</h1>
            <p class="text-gray-500 mt-2">Cloud Management Platform</p>
        </div>
        <div class="card rounded-2xl p-8 glow">
            <h2 class="text-xl font-bold mb-2">Welcome Back</h2>
            <p class="text-gray-500 text-sm mb-6">Sign in to your account to continue</p>
            {% if error %}<div class="rounded-xl p-4 mb-6 text-red-400 text-sm flex items-center gap-3" style="background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.2)"><i class="fas fa-circle-exclamation"></i>{{ error }}</div>{% endif %}
            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-600"></i>
                        <input type="text" name="username" required autofocus class="input-field w-full rounded-xl px-11 py-3.5 focus:outline-none" placeholder="Enter username">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-600"></i>
                        <input type="password" name="password" required minlength="6" class="input-field w-full rounded-xl px-11 py-3.5 focus:outline-none" placeholder="Enter password">
                    </div>
                </div>
                <button type="submit" class="btn-primary w-full rounded-xl py-3.5 font-semibold text-white text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-right-to-bracket"></i>Sign In
                </button>
            </form>
            <p class="text-center mt-6 text-gray-600 text-xs">Default: <span class="text-gray-400">admin</span> / <span class="text-gray-400">admin@123</span></p>
        </div>
    </div>
</div>
{% endblock %}
